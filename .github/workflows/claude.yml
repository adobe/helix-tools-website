name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          claude_args: '--allowedTools "Bash(gh *)" "Bash(git *)" "Read" "Write" "Glob" "Grep" "LS" "Skill"'

          prompt: |
            The user commented: "${{ github.event.comment.body || github.event.review.body || github.event.issue.body }}"

            If they are asking for a code review, use the Skill tool to invoke the `code-review` skill for PR #${{ github.event.issue.number || github.event.pull_request.number }}.
            When running `gh pr view` and `gh pr diff`, add `--repo ${{ github.repository }}`.
            Substitute `{owner}/{repo}` with `${{ github.repository }}` in all commands.

            Otherwise, perform the instructions in their comment.
