<!DOCTYPE html>
<html lang="en">

<head>
  <meta
    http-equiv="Content-Security-Policy"
    content="script-src 'nonce-aem' 'strict-dynamic'; base-uri 'self'; object-src 'none';"
    move-to-http-header="true"
  >
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Library</title>
  <script nonce="aem" src="/scripts/aem.js" type="module"></script>
  <script nonce="aem" src="/scripts/scripts.js" type="module"></script>
  <link rel="stylesheet" href="/utils/config/config.css" />
  <link rel="stylesheet" href="/styles/styles.css" />
  <script nonce="aem" src="/tools/media-library/media-library.js" type="module"></script>
  <link rel="stylesheet" href="/tools/media-library/media-library.css" />
  <link rel="stylesheet" href="/tools/media-library/views/mediainfo/mediainfo.css" />
</head>

<body class="media-library">
  <header></header>
  <main>
    <div class="media-library-title">
      <h1>Media Library</h1>
      <p>Track and analyze media usage across your AEM Edge Delivery site</p>
    </div>

    <div class="media-library-config">
      <form id="media-library-form">
        <section class="form-field config-field">
          <div class="form-field org-field">
            <label for="org">Organization</label>
            <input name="org" id="org" list="org-list" autocomplete="off" required />
            <datalist id="org-list"></datalist>
          </div>
          <div class="form-field site-field">
            <label for="site">Site</label>
            <input name="site" id="site" list="site-list" autocomplete="off" disabled required />
            <datalist id="site-list"></datalist>
          </div>
          <div class="form-field path-field">
            <label for="path">Path (optional)</label>
            <input name="path" id="path" type="text" placeholder="e.g. /docs" autocomplete="off" />
          </div>
        </section>
        <p class="button-wrapper">
          <button type="submit" id="load-media" class="button">
            <span class="load-btn-text">Load Media</span>
            <span class="load-btn-loading" hidden>
              <span class="load-btn-spinner" aria-hidden="true"></span>
              Loading…
            </span>
          </button>
          <button type="reset" class="button outline">Reset</button>
        </p>
        <p class="form-validation-error" id="form-validation-error" role="alert" hidden></p>
      </form>
      <div class="media-library-config-bar" id="config-bar" hidden>
        <span class="config-bar-label" id="config-bar-label"></span>
        <button type="button" class="button outline" id="config-bar-change">Change site</button>
      </div>
    </div>

    <div class="workspace" id="workspace" hidden>
      <div class="workspace-banner" id="media-persistent-banner" role="alert" aria-live="assertive" hidden></div>
      <div class="sidebar"></div>
      <div class="topbar"></div>
      <div class="grid"></div>
    </div>
  </main>
  <footer></footer>
</body>

</html>
