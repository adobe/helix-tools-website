<!DOCTYPE html>
<html lang="en">
<head>
  <meta
    http-equiv="Content-Security-Policy"
    content="script-src 'nonce-aem' 'strict-dynamic'; base-uri 'self'; object-src 'none';"
    move-to-http-header="true"
  >
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="lab" content="true">
  <title>Optel Checker | AEM Tools</title>
  <script nonce="aem" src="/scripts/aem.js" type="module"></script>
  <script nonce="aem" src="/scripts/scripts.js" type="module"></script>
  <link rel="stylesheet" href="/styles/styles.css" />
  <script nonce="aem" src="/tools/optel-checker/optel-checker.js" type="module"></script>
  <link rel="stylesheet" href="/tools/optel-checker/optel-checker.css" />
</head>
<body class="optel-checker">
  <header></header>
  <main>
    <div>
      <h1>OpTel Checker</h1>
    </div>

    <div>
      <form id="check-form">
        OpTel is not always collected as expected. This tool can help diagnose issues.
        <div class="form-field text-field">
          <label for="url-input">URL to check</label>
          <input
            type="url"
            name="url"
            id="url-input"
            placeholder="https://www.example.com"
            autocomplete="off"
            required
          />
        </div>
        <p class="button-wrapper">
          <button type="submit" class="button" id="submit-btn">Submit</button>
        </p>
      </form>
    </div>

    <div
      id="tool-output"
      class="optel-checker-output"
      data-state="idle"
      aria-live="polite"
    >
      <section class="optel-checker-section" aria-labelledby="opel-heading">
        <h2 id="opel-heading" class="optel-checker-h2">OpTel script</h2>
        <p id="opel-status" class="optel-checker-status"></p>
        <pre id="opel-matched" class="optel-checker-pre" hidden></pre>
      </section>
      <section id="csp-section" class="optel-checker-section" aria-labelledby="csp-heading" hidden>
        <h2 id="csp-heading" class="optel-checker-h2">Content-Security-Policy</h2>
        <pre id="csp-result" class="optel-checker-pre"></pre>
      </section>
      <section id="rum-probe-section" class="optel-checker-section" aria-labelledby="rum-probe-heading" hidden>
        <h2 id="rum-probe-heading" class="optel-checker-h2">OpTel POST probe</h2>
        <pre id="rum-probe-result" class="optel-checker-pre"></pre>
      </section>
    </div>
  </main>
  <footer></footer>
</body>
</html>
